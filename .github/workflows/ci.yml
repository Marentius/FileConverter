name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        cd packages/core
        npm ci
    
    - name: Run linting
      run: |
        cd packages/core
        npm run lint
    
    - name: Run unit tests
      run: |
        cd packages/core
        npm run test:unit
    
    - name: Run integration tests
      run: |
        cd packages/core
        npm run test:integration
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./packages/core/coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  e2e-test:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install system dependencies (Pandoc, LaTeX)
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc texlive-latex-base texlive-latex-recommended texlive-fonts-recommended lmodern
    
    - name: Install dependencies
      run: |
        cd packages/core
        npm ci
    
    - name: Build project
      run: |
        cd packages/core
        npm run build
    
    - name: Run E2E tests
      run: |
        cd packages/core
        npm run test:e2e

  build-binaries:
    runs-on: ${{ matrix.os }}
    needs: [test, e2e-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        cd packages/core
        npm ci
    
    - name: Build project
      run: |
        cd packages/core
        npm run build
    
    - name: Create binary package
      run: |
        cd packages/core
        mkdir -p dist-bin
        cp -r dist/* dist-bin/
        cp package.json dist-bin/
        cd dist-bin
        npm install --production
        rm -rf node_modules/.cache
    
    - name: Upload binary artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fileconverter-${{ matrix.os }}
        path: packages/core/dist-bin/
        retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build-binaries
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/fileconverter-ubuntu-latest/**
          artifacts/fileconverter-windows-latest/**
          artifacts/fileconverter-macos-latest/**
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
