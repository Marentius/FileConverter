name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace=packages/core

      - name: Lint
        run: npm run lint --workspace=packages/core

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace=packages/core

      - name: Unit tests
        run: npm run test:unit --workspace=packages/core

      - name: Integration tests
        run: npm run test:integration --workspace=packages/core

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace=packages/core

      - name: Build
        run: npm run build --workspace=packages/core

      - name: E2E tests
        run: npm run test:e2e --workspace=packages/core
